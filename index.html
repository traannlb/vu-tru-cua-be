<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vũ Trụ Của Bé</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #000010, #000000);
  font-family: Arial;
}

/* ⭐ sao */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: blink 2s infinite;
}
@keyframes blink {50%{opacity:0.2;}}

/* 🌍 Trái Đất */
.earth {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, #4fd1ff, #003366);
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: 1.2s ease;
  z-index: 5;
  box-shadow: 0 0 40px #00ccff;
}

/* tiêu đề */
.title {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 28px;
  color: white;
  z-index: 6;
  transition: 1s;
}

/* ☀️ Mặt Trời */
.sun {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, #ffcc00, #ff6600);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: 1s;
  box-shadow: 0 0 60px orange;
}

/* 🪐 orbit */
.orbit {
  position: absolute;
  border: 1px dashed rgba(255,255,255,0.15);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: 1s;
}

/* hành tinh */
.planet {
  position: absolute;
  top: 50%;
  left: 100%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
}

/* quay */
@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* orbit sizes */
.orbit1 { width:120px;height:120px;animation:spin 4s linear infinite;}
.orbit2 { width:170px;height:170px;animation:spin 6s linear infinite;}
.orbit3 { width:220px;height:220px;}
.orbit4 { width:270px;height:270px;animation:spin 10s linear infinite;}
.orbit5 { width:330px;height:330px;animation:spin 14s linear infinite;}
.orbit6 { width:390px;height:390px;animation:spin 16s linear infinite;}
.orbit7 { width:450px;height:450px;animation:spin 18s linear infinite;}
.orbit8 { width:510px;height:510px;animation:spin 20s linear infinite;}

/* khi vào hệ */
.space-mode .earth {
  width: 14px;
  height: 14px;
  box-shadow: none;
}

.space-mode .sun { opacity: 1; }
.space-mode .orbit { opacity: 1; }
.space-mode .title { opacity: 0; }

/* hint */
.hint {
  position: absolute;
  top: 10px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  color: white;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="earth" onclick="enterSolar()"></div>
<div class="title">Vũ Trụ Của Bé</div>
<div class="hint">⬇ Vuốt xuống để quay lại</div>

<div class="sun"></div>

<!-- 🪐 hệ mặt trời -->
<div class="orbit orbit1"><div class="planet" style="width:6px;height:6px;background:gray;"></div></div>
<div class="orbit orbit2"><div class="planet" style="width:10px;height:10px;background:#eccc9a;"></div></div>
<div class="orbit orbit3"></div>
<div class="orbit orbit4"><div class="planet" style="width:8px;height:8px;background:red;"></div></div>
<div class="orbit orbit5"><div class="planet" style="width:18px;height:18px;background:orange;"></div></div>
<div class="orbit orbit6"><div class="planet" style="width:16px;height:16px;background:#d2b48c;"></div></div>
<div class="orbit orbit7"><div class="planet" style="width:14px;height:14px;background:#66ccff;"></div></div>
<div class="orbit orbit8"><div class="planet" style="width:14px;height:14px;background:#3366ff;"></div></div>

<script>
// ⭐ tạo sao
for (let i = 0; i < 120; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.top = Math.random()*100+"%";
  s.style.left = Math.random()*100+"%";
  document.body.appendChild(s);
}

// 🚀 vào hệ mặt trời
function enterSolar() {
  document.body.classList.add("space-mode");

  setTimeout(() => {
    const earth = document.querySelector(".earth");
    const orbit3 = document.querySelector(".orbit3");

    orbit3.appendChild(earth);

    earth.style.left = "100%";
    earth.style.top = "50%";
    earth.style.transform = "translate(-50%, -50%)";

    orbit3.style.animation = "spin 8s linear infinite";
  }, 1000);
}

// 👆 vuốt xuống để quay lại
let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;

  if (endY - startY > 100) {
    resetView();
  }
});

// 🔄 reset về ban đầu
function resetView() {
  document.body.classList.remove("space-mode");

  const earth = document.querySelector(".earth");
  document.body.appendChild(earth);

  earth.style.width = "160px";
  earth.style.height = "160px";
  earth.style.top = "50%";
  earth.style.left = "50%";
  earth.style.transform = "translate(-50%, -50%)";
  earth.style.boxShadow = "0 0 40px #00ccff";

  document.querySelector(".orbit3").style.animation = "none";
}
</script>

</body>
  </html>
