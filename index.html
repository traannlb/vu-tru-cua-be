<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vũ Trụ Của Bé</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

/* ⭐ sao */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: blink 2s infinite;
}
@keyframes blink {50%{opacity:0.2;}}

/* 🌍 Trái Đất */
.earth {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, #4fd1ff, #003366);
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: 1.2s ease;
  z-index: 5;
}

/* ☀️ Mặt Trời */
.sun {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, #ffcc00, #ff6600);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: 1s;
}

/* orbit */
.orbit {
  position: absolute;
  border: 1px dashed rgba(255,255,255,0.2);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* orbit Earth */
.orbit-earth {
  width: 260px;
  height: 260px;
  animation: spin 10s linear infinite;
}

@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* 🌍 khi thành hành tinh */
.space-mode .earth {
  width: 14px;
  height: 14px;
  top: 50%;
  left: calc(50% + 130px); /* nằm trên quỹ đạo */
  transform: translate(-50%, -50%);
  box-shadow: none;
}

/* bật hệ mặt trời */
.space-mode .sun {
  opacity: 1;
}

/* tiêu đề */
.title {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 28px;
  z-index: 6;
  transition: 1s;
}

.space-mode .title {
  opacity: 0;
}
</style>
</head>

<body>

<div class="earth" onclick="enterSolar()"></div>
<div class="title">Vũ Trụ Của Bé</div>

<div class="sun"></div>

<!-- quỹ đạo Trái Đất -->
<div class="orbit orbit-earth"></div>

<script>
// tạo sao
for (let i = 0; i < 120; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.top = Math.random()*100+"%";
  s.style.left = Math.random()*100+"%";
  document.body.appendChild(s);
}

// chuyển cảnh
function enterSolar() {
  document.body.classList.add("space-mode");

  // cho Trái Đất quay quanh Mặt Trời sau khi vào
  setTimeout(()=>{
    document.querySelector(".earth").style.animation = "spin 10s linear infinite";
  }, 1200);
}
</script>

</body>
</html>
