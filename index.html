<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Vũ Trụ Của Bé - Nền Sao</title>
    <style>
        /* 1. Thiết lập khung hình toàn màn hình */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Không cho cuộn trang */
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); /* Nền xanh đen sâu thẳm */
        }

        /* 2. Tạo lớp chứa các ngôi sao */
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 3. Hiệu ứng lấp lánh cho sao (Animation) */
        @keyframes twinkle {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div id="stars-container"></div>

    <script>
        // 4. Script nhỏ để rải sao ngẫu nhiên
        const container = document.getElementById('stars-container');
        const starCount = 150; // Số lượng ngôi sao

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            // Kích thước ngẫu nhiên từ 1px đến 3px
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            
            // Vị trí ngẫu nhiên
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            
            // Thời gian lấp lánh khác nhau cho tự nhiên
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            
            container.appendChild(star);
        }
    </script>
</body>
</html>
