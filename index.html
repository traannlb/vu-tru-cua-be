<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vũ Trụ Của Bé</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #000010, #000000);
  font-family: Arial;
}

/* ⭐ sao */
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: blink infinite;
  z-index: 1;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* 🌍 Trái Đất (ở giữa ban đầu) */
.earth {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, #4fd1ff, #003366);
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: 1s ease;
  z-index: 5;
  box-shadow: 0 0 50px #00ccff;
}

/* tiêu đề */
.title {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 28px;
  color: white;
  z-index: 6;
  transition: 1s;
}

/* ☀️ Mặt Trời */
.sun {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, #ffcc00, #ff6600);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: 1s;
  z-index: 4;
  box-shadow: 0 0 100px orange;
}

/* 🪐 orbit elip */
.orbit {
  position: absolute;
  border: 1px dashed rgba(255,255,255,0.15);
  border-radius: 50% / 40%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: 1s;
  z-index: 2;
}

/* container quay */
.planet-wrap {
  position: absolute;
  width: 100%;
  height: 100%;
  animation: spin linear infinite;
}

/* hành tinh */
.planet {
  position: absolute;
  top: 50%;
  left: 100%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
}

/* quay */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* kích thước elip */
.orbit1 { width: 20vw; height: 10vw; }
.orbit2 { width: 28vw; height: 14vw; }
.orbit3 { width: 42vw; height: 21vw; }
.orbit4 { width: 50vw; height: 25vw; }
.orbit5 { width: 60vw; height: 30vw; }
.orbit6 { width: 70vw; height: 35vw; }
.orbit7 { width: 80vw; height: 40vw; }
.orbit8 { width: 90vw; height: 45vw; }

/* tốc độ */
.orbit1 .planet-wrap { animation-duration: 4s; }
.orbit2 .planet-wrap { animation-duration: 6s; }
.orbit3 .planet-wrap { animation-duration: 8s; }
.orbit4 .planet-wrap { animation-duration: 10s; }
.orbit5 .planet-wrap { animation-duration: 14s; }
.orbit6 .planet-wrap { animation-duration: 16s; }
.orbit7 .planet-wrap { animation-duration: 18s; }
.orbit8 .planet-wrap { animation-duration: 20s; }

/* vào hệ */
.space-mode .sun { opacity: 1; }
.space-mode .orbit { opacity: 1; }
.space-mode .title { opacity: 0; }

/* hint */
.hint {
  position: absolute;
  top: 10px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  color: white;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="earth" onclick="enterSolar()"></div>
<div class="title">Vũ Trụ Của Bé</div>
<div class="hint">⬇ Vuốt xuống để quay lại</div>

<div class="sun"></div>

<!-- 🪐 hệ -->
<div class="orbit orbit1">
  <div class="planet-wrap">
    <div class="planet" style="width:6px;height:6px;background:gray;"></div>
  </div>
</div>

<div class="orbit orbit2">
  <div class="planet-wrap">
    <div class="planet" style="width:10px;height:10px;background:#eccc9a;"></div>
  </div>
</div>

<div class="orbit orbit3">
  <div class="planet-wrap"></div>
</div>

<div class="orbit orbit4">
  <div class="planet-wrap">
    <div class="planet" style="width:8px;height:8px;background:red;"></div>
  </div>
</div>

<div class="orbit orbit5">
  <div class="planet-wrap">
    <div class="planet" style="width:18px;height:18px;background:orange;"></div>
  </div>
</div>

<div class="orbit orbit6">
  <div class="planet-wrap">
    <div class="planet" style="width:16px;height:16px;background:#d2b48c;"></div>
  </div>
</div>

<div class="orbit orbit7">
  <div class="planet-wrap">
    <div class="planet" style="width:14px;height:14px;background:#66ccff;"></div>
  </div>
</div>

<div class="orbit orbit8">
  <div class="planet-wrap">
    <div class="planet" style="width:14px;height:14px;background:#3366ff;"></div>
  </div>
</div>

<script>
// ⭐ sao
for (let i = 0; i < 200; i++) {
  let s = document.createElement("div");
  s.className = "star";
  let size = Math.random() * 2.5;
  s.style.width = size + "px";
  s.style.height = size + "px";
  s.style.top = Math.random()*100+"%";
  s.style.left = Math.random()*100+"%";
  s.style.animationDuration = (1 + Math.random()*2) + "s";
  document.body.appendChild(s);
}

// 🚀 vào hệ
function enterSolar() {
  document.body.classList.add("space-mode");

  const earth = document.querySelector(".earth");
  const orbit3 = document.querySelector(".orbit3");
  const wrap = orbit3.querySelector(".planet-wrap");

  const rect = earth.getBoundingClientRect();

  earth.style.position = "absolute";
  earth.style.left = rect.left + "px";
  earth.style.top = rect.top + "px";

  setTimeout(() => {
    earth.style.transition = "1s ease";
    earth.style.left = (orbit3.getBoundingClientRect().left + orbit3.offsetWidth) + "px";
    earth.style.top = (orbit3.getBoundingClientRect().top + orbit3.offsetHeight/2) + "px";
    earth.style.transform = "translate(-50%, -50%) scale(0.1)";
  }, 50);

  setTimeout(() => {
    wrap.appendChild(earth);
    earth.style.left = "100%";
    earth.style.top = "50%";
  }, 1100);
}

// 👆 vuốt xuống để quay lại
let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;
  if (endY - startY > 100) {
    location.reload();
  }
});
</script>

</body>
</html>
