<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vũ Trụ Của Bé</title>

<!-- Font hoạt hình -->
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #000010, #000000);
    font-family: 'Baloo 2', cursive;
    color: white;
}

/* Sao */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: blink 2s infinite;
    z-index: 1;
}

@keyframes blink {
    50% { opacity: 0.2; }
}

/* Trái Đất (trừu tượng) */
.earth {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #4fd1ff, #003366);
    box-shadow: 0 0 40px #00ccff;
    cursor: pointer;
    z-index: 3;
    transition: all 1s ease;
}

/* Tiêu đề */
.title {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    text-shadow: 0 0 15px #00ccff;
    z-index: 4;
    pointer-events: none;
}

/* Mặt Trời */
.sun {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffcc00, #ff6600);
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: 1s;
    z-index: 2;
}

/* Khi vào hệ mặt trời */
.space-mode .earth {
    transform: translate(200px, -100px) scale(0.3);
}

.space-mode .title {
    opacity: 0;
}

.space-mode .sun {
    opacity: 1;
}

/* Vuốt xuống hint */
.hint {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="earth" onclick="enterSolar()"></div>
<div class="title">Vũ Trụ Của Bé</div>
<div class="sun"></div>
<div class="hint">⬇ Vuốt xuống để quay lại</div>

<script>
// tạo sao
for (let i = 0; i < 120; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    document.body.appendChild(star);
}

// click vào Trái Đất
function enterSolar() {
    document.body.classList.add("space-mode");
}

// vuốt xuống để quay lại
let startY = 0;

document.addEventListener("touchstart", e => {
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
    let endY = e.changedTouches[0].clientY;

    if (endY - startY > 100) {
        document.body.classList.remove("space-mode");
    }
});
</script>

</body>
</html>
