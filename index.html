<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vũ Trụ Của Bé</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #000010, #000000);
    font-family: 'Baloo 2', cursive;
    color: white;
}

/* ⭐ Sao */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: blink 2s infinite;
    z-index: 1;
}

@keyframes blink {
    50% { opacity: 0.2; }
}

/* 🌍 Trái Đất */
.earth {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #4fd1ff, #003366);
    box-shadow: 0 0 40px #00ccff;
    cursor: pointer;
    z-index: 3;
    transition: all 1s ease;
}

/* Tiêu đề */
.title {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    text-shadow: 0 0 15px #00ccff;
    z-index: 4;
    pointer-events: none;
}

/* ☀️ Hệ mặt trời ảnh */
.solar-map {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    width: 90%;
    max-width: 700px;
    opacity: 0;
    transition: 1s;
    z-index: 2;
    border-radius: 15px;
}

/* Khi vào hệ mặt trời */
.space-mode .earth {
    transform: translate(200px, -100px) scale(0.3);
}

.space-mode .title {
    opacity: 0;
}

.space-mode .solar-map {
    opacity: 1;
}

/* 🪐 Vùng click hành tinh */
.planet-zone {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
}

/* Popup */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
}

.popup-box {
    background: #111;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    max-width: 300px;
}

/* Hint */
.hint {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    opacity: 0.5;
}
</style>
</head>

<body>

<!-- 🌍 Trái Đất -->
<div class="earth" onclick="enterSolar()"></div>
<div class="title">Vũ Trụ Của Bé</div>

<!-- 🌌 Ảnh hệ mặt trời -->
<img src="https://cdn3.olm.vn/upload/img/0418/img_2025-04-18_6801becfdd6ce.jpg" class="solar-map">

<!-- 🪐 Vùng click -->
<div class="planet-zone" style="top:45%;left:20%;width:40px;height:40px;" onclick="showPlanet('Sao Thủy')"></div>
<div class="planet-zone" style="top:50%;left:30%;width:45px;height:45px;" onclick="showPlanet('Sao Kim')"></div>
<div class="planet-zone" style="top:55%;left:40%;width:50px;height:50px;" onclick="showPlanet('Trái Đất')"></div>
<div class="planet-zone" style="top:60%;left:50%;width:50px;height:50px;" onclick="showPlanet('Sao Hỏa')"></div>
<div class="planet-zone" style="top:50%;left:60%;width:70px;height:70px;" onclick="showPlanet('Sao Mộc')"></div>
<div class="planet-zone" style="top:45%;left:70%;width:60px;height:60px;" onclick="showPlanet('Sao Thổ')"></div>
<div class="planet-zone" style="top:40%;left:80%;width:55px;height:55px;" onclick="showPlanet('Sao Thiên Vương')"></div>
<div class="planet-zone" style="top:35%;left:90%;width:55px;height:55px;" onclick="showPlanet('Sao Hải Vương')"></div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h2 id="planetName"></h2>
        <p>Con muốn khám phá hành tinh này không? 🚀</p>
        <button onclick="closePopup()">Đóng</button>
    </div>
</div>

<div class="hint">⬇ Vuốt xuống để quay lại</div>

<script>
// ⭐ tạo sao
for (let i = 0; i < 120; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    document.body.appendChild(star);
}

// 🌍 vào hệ mặt trời
function enterSolar() {
    document.body.classList.add("space-mode");
}

// 🪐 chọn hành tinh
function showPlanet(name) {
    document.getElementById("planetName").innerText = name;
    document.getElementById("popup").style.display = "flex";
}

// đóng popup
function closePopup() {
    document.getElementById("popup").style.display = "none";
}

// 👆 vuốt xuống để quay lại
let startY = 0;

document.addEventListener("touchstart", e => {
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
    let endY = e.changedTouches[0].clientY;

    if (endY - startY > 100) {
        document.body.classList.remove("space-mode");
    }
});
</script>

</body>
</html>
