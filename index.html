<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vũ Trụ Của Bé</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #000010, #000000);
  font-family: Arial;
}

/* ⭐ sao */
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: blink infinite;
  z-index: 1;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* 🌍 Trái Đất */
.earth {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, #4fd1ff, #003366);
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: 1.2s ease;
  z-index: 5;
  box-shadow: 0 0 50px #00ccff;
}

/* tiêu đề */
.title {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 28px;
  color: white;
  z-index: 6;
  transition: 1s;
}

/* ☀️ Mặt Trời */
.sun {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, #ffcc00, #ff6600);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: 1s;
  z-index: 4;
  box-shadow: 0 0 80px orange;
}

/* 🪐 orbit */
.orbit {
  position: absolute;
  border: 1px dashed rgba(255,255,255,0.15);
  border-radius: 50% / 35%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: 1s;
  z-index: 3;
}

/* hành tinh */
.planet {
  position: absolute;
  top: 50%;
  left: 115%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
}

/* quay */
@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* quỹ đạo elip responsive */
.orbit1 { width: 20vw; height: 10vw; animation:spin 4s linear infinite;}
.orbit2 { width: 28vw; height: 14vw; animation:spin 6s linear infinite;}
.orbit3 { width: 36vw; height: 18vw;}
.orbit4 { width: 44vw; height: 22vw; animation:spin 10s linear infinite;}
.orbit5 { width: 54vw; height: 27vw; animation:spin 14s linear infinite;}
.orbit6 { width: 64vw; height: 32vw; animation:spin 16s linear infinite;}
.orbit7 { width: 74vw; height: 37vw; animation:spin 18s linear infinite;}
.orbit8 { width: 84vw; height: 42vw; animation:spin 20s linear infinite;}

/* vào hệ */
.space-mode .earth {
  box-shadow: none;
}
.space-mode .sun { opacity: 1; }
.space-mode .orbit { opacity: 1; }
.space-mode .title { opacity: 0; }

/* hint */
.hint {
  position: absolute;
  top: 10px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  color: white;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="earth" onclick="enterSolar()"></div>
<div class="title">Vũ Trụ Của Bé</div>
<div class="hint">⬇ Vuốt xuống để quay lại</div>

<div class="sun"></div>

<!-- 🪐 hệ -->
<div class="orbit orbit1"><div class="planet" style="width:6px;height:6px;background:gray;"></div></div>
<div class="orbit orbit2"><div class="planet" style="width:10px;height:10px;background:#eccc9a;"></div></div>
<div class="orbit orbit3"></div>
<div class="orbit orbit4"><div class="planet" style="width:8px;height:8px;background:red;"></div></div>
<div class="orbit orbit5"><div class="planet" style="width:18px;height:18px;background:orange;"></div></div>
<div class="orbit orbit6"><div class="planet" style="width:16px;height:16px;background:#d2b48c;"></div></div>
<div class="orbit orbit7"><div class="planet" style="width:14px;height:14px;background:#66ccff;"></div></div>
<div class="orbit orbit8"><div class="planet" style="width:14px;height:14px;background:#3366ff;"></div></div>

<script>
// ⭐ tạo sao
for (let i = 0; i < 180; i++) {
  let s = document.createElement("div");
  s.className = "star";

  let size = Math.random() * 3;
  s.style.width = size + "px";
  s.style.height = size + "px";

  s.style.top = Math.random()*100+"%";
  s.style.left = Math.random()*100+"%";

  s.style.animationDuration = (1 + Math.random()*2) + "s";

  document.body.appendChild(s);
}

// 🚀 vào hệ
function enterSolar() {
  document.body.classList.add("space-mode");

  const earth = document.querySelector(".earth");
  const orbit3 = document.querySelector(".orbit3");

  const orbitRect = orbit3.getBoundingClientRect();

  const targetX = orbitRect.left + orbitRect.width;
  const targetY = orbitRect.top + orbitRect.height / 2;

  const rect = earth.getBoundingClientRect();

  earth.style.position = "absolute";
  earth.style.left = rect.left + "px";
  earth.style.top = rect.top + "px";

  setTimeout(() => {
    earth.style.transition = "1s ease";
    earth.style.left = targetX + "px";
    earth.style.top = targetY + "px";
    earth.style.transform = "translate(-50%, -50%) scale(0.1)";
  }, 50);

  setTimeout(() => {
    orbit3.appendChild(earth);

    earth.style.left = "100%";
    earth.style.top = "50%";
    earth.style.transform = "translate(-50%, -50%) scale(0.1)";

    orbit3.style.animation = "spin 8s linear infinite";
  }, 1100);
}

// 👆 vuốt xuống
let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;
  if (endY - startY > 100) reverseToHome();
});

// 🔄 quay lại
function reverseToHome() {
  const earth = document.querySelector(".earth");
  const orbit3 = document.querySelector(".orbit3");

  orbit3.style.animation = "none";

  const rect = earth.getBoundingClientRect();

  document.body.appendChild(earth);

  earth.style.position = "absolute";
  earth.style.left = rect.left + "px";
  earth.style.top = rect.top + "px";

  earth.style.transform = "translate(-50%, -50%) scale(0.1)";

  setTimeout(() => {
    earth.style.transition = "1s ease";
    earth.style.left = "50%";
    earth.style.top = "50%";
    earth.style.transform = "translate(-50%, -50%) scale(0.1)";
  }, 50);

  setTimeout(() => {
    document.body.classList.remove("space-mode");

    earth.style.transform = "translate(-50%, -50%) scale(1)";
    earth.style.width = "160px";
    earth.style.height = "160px";
    earth.style.boxShadow = "0 0 50px #00ccff";
  }, 1100);
}

// 📱 auto fit
window.addEventListener("resize", () => {
  document.body.style.zoom = window.innerWidth / 400;
});

window.onload = () => {
  document.body.style.zoom = window.innerWidth / 400;
};
</script>

</body>
</html>
